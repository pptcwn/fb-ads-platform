name: CI/CD Auto Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter api test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v5

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /root/fb-ads-platform
            git fetch origin main
            # VPS must match repo exactly — discard stale local edits from dev mounts
            git reset --hard origin/main
            echo "=== Disk before cleanup ==="
            df -h /
            docker compose down --remove-orphans 2>/dev/null || true
            docker system prune -af
            docker builder prune -af 2>/dev/null || true
            echo "=== Disk after cleanup ==="
            df -h /
            AVAIL=$(df / --output=avail -BG | tail -1 | tr -d 'G')
            if [ "${AVAIL:-0}" -lt 5 ]; then
              echo "ERROR: Need at least 5GB free on / (have ${AVAIL}G). Prune images/volumes manually."
              exit 1
            fi
            docker compose build api web
            docker compose up -d --force-recreate --renew-anon-volumes
            docker compose exec -T api sh -c 'cd apps/api && npx prisma migrate deploy'
            docker compose ps
            echo "Waiting for API health..."
            for i in $(seq 1 30); do
              if docker compose exec -T api wget -q -O- http://127.0.0.1:4000/api/health 2>/dev/null | grep -q '"status":"ok"'; then
                echo "API healthy after ${i}0s"
                exit 0
              fi
              sleep 10
            done
            echo "API failed health check — container logs:"
            docker compose logs api --tail 80
            exit 1
          EOF