name: CI/CD Auto Deploy to VPS

# 💡 เพิ่มตรงนี้เพื่อเปิดระบบบังคับใช้ Node.js 24 ในทุกสเต็ปของสคริปต์นี้
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# สั่งให้ระบบทำงานเมื่อมีการ Push โค้ดขึ้นไปที่กิ่ง main เท่านั้น
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Executing Remote SSH Commands via Passwordless Key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/fb-ads-platform
            git pull origin main
            docker compose up -d --build