server {
    listen 80;
    server_name fb-ads.minstance.cloud;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fb-ads.minstance.cloud;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Meta webhooks — enable mTLS when META_WEBHOOK_MTLS_REQUIRED=true (see docs/meta-webhooks-mtls.md)
    # location /api/webhooks/meta {
    #     listen 443 ssl http2;
    #     ssl_verify_client on;
    #     ssl_client_certificate /etc/nginx/ssl/meta-ca-bundle.pem;
    #     proxy_pass http://api:4000;
    #     proxy_set_header X-SSL-Client-Verify $ssl_client_verify;
    #     proxy_set_header Host $host;
    # }

    location /ws/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
