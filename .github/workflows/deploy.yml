name: CI/CD Auto Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter api test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v5

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /root/fb-ads-platform
            git fetch origin main
            # VPS must match repo exactly — discard stale local edits from dev mounts
            git reset --hard origin/main
            docker compose build --no-cache api web
            docker compose up -d --force-recreate --renew-anon-volumes
            docker compose exec -T api sh -c 'cd apps/api && npx prisma migrate deploy'
            docker compose ps
          EOF