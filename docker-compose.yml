services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fb_ads_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save "300 10"
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      # 💡 ถ้าต้องการรัน Production บน VPS ให้เปลี่ยนเป็น Dockerfile.prod นะครับ
      dockerfile: apps/api/Dockerfile.dev 
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      # Anonymous Volumes เพื่อป้องกันไม่ให้ node_modules ในเครื่อง VPS วิ่งไปทับในตู้คอนเทนเนอร์
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      # 💡 ถ้าต้องการรัน Production บน VPS ให้เปลี่ยนเป็น Dockerfile.prod นะครับ
      dockerfile: apps/web/Dockerfile.dev 
    restart: unless-stopped
    env_file: .env
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Next rewrites /api/* to the API container on the compose network
      API_INTERNAL_URL: http://api:4000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
    ports:
      - "3001:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 180s

volumes:
  pgdata:
  redisdata: