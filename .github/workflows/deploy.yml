name: CI/CD Auto Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api exec prisma generate
      - run: pnpm --filter api test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v5

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'EOF'
            set -euo pipefail
            cd /root/fb-ads-platform

            DEPLOY_OK=0
            # If deploy fails after we touch containers, bring the stack back (prevents 502)
            restore_on_failure() {
              local code=$?
              if [ "$DEPLOY_OK" -eq 1 ] || [ "$code" -eq 0 ]; then
                exit "$code"
              fi
              echo "=== DEPLOY FAILED (exit $code) — restoring stack ==="
              docker compose up -d postgres redis api web --remove-orphans 2>&1 || true
              for i in 1 2 3 4 5 6; do
                if curl -sf http://127.0.0.1:3001/ >/dev/null 2>&1; then
                  echo "Restore: web responding on :3001"
                  break
                fi
                sleep 10
              done
              docker compose ps -a || true
              exit "$code"
            }
            trap restore_on_failure EXIT

            git fetch origin main
            git reset --hard origin/main

            echo "=== Pre-deploy health (site should stay up during build) ==="
            curl -sf -o /dev/null http://127.0.0.1:3001/ && echo "Web OK before deploy" || echo "Web down before deploy (will start after up)"

            echo "=== Disk before cleanup (no compose down — avoids 502 window) ==="
            df -h /
            docker volume prune -f 2>/dev/null || true
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            echo "=== Disk after cleanup ==="
            df -h /
            AVAIL=$(df / --output=avail -BG | tail -1 | tr -d 'G')
            if [ "${AVAIL:-0}" -lt 5 ]; then
              echo "ERROR: Need at least 5GB free on / (have ${AVAIL}G). Prune images/volumes manually."
              exit 1
            fi

            # Build while old containers still serve traffic (if running)
            docker compose build api web

            # Seed named node_modules volumes (idempotent)
            docker compose run --rm --no-deps -e CI=true api sh -c 'pnpm install --frozen-lockfile'
            docker compose run --rm --no-deps -e CI=true web sh -c 'pnpm install --frozen-lockfile'

            # Rolling recreate: keep postgres/redis up; only replace api + web
            docker compose up -d postgres redis
            docker compose up -d --force-recreate api web

            docker compose exec -T api sh -c 'cd apps/api && npx prisma migrate deploy'
            docker compose ps

            echo "Waiting for API health..."
            API_OK=0
            for i in $(seq 1 30); do
              if docker compose exec -T api wget -q -O- http://127.0.0.1:4000/api/health 2>/dev/null | grep -q '"status":"ok"'; then
                echo "API healthy after ${i}0s"
                API_OK=1
                break
              fi
              sleep 10
            done
            if [ "$API_OK" -ne 1 ]; then
              echo "API failed health check — container logs:"
              docker compose logs api --tail 80
              exit 1
            fi

            echo "Waiting for Web (Next dev may take several minutes on first compile)..."
            WEB_OK=0
            for i in $(seq 1 36); do
              if curl -sf http://127.0.0.1:3001/ >/dev/null 2>&1; then
                echo "Web healthy after ${i}0s"
                WEB_OK=1
                break
              fi
              sleep 10
            done
            if [ "$WEB_OK" -ne 1 ]; then
              echo "Web failed health check — container logs:"
              docker compose logs web --tail 120
              docker compose ps -a
              exit 1
            fi

            echo "=== Post-deploy: web + api healthy ==="
            DEPLOY_OK=1
          EOF